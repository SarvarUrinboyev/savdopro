name: barakat_market
description: Barakat Market — mijozlar uchun xarid va yetkazib berish ilovasi.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Network
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Formatting (narx, sana)
  intl: ^0.19.0

  # Rasm keshlash
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
