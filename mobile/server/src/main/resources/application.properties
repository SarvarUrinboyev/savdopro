# ===== Barakat Market Mobile Backend (dev) =====
# Prod uchun: --spring.profiles.active=prod  (application-prod.properties ishlatiladi)
spring.application.name=barakat-mobile
server.port=8090
server.servlet.context-path=/api

# ----- Database (dev: H2 file) -----
spring.datasource.url=jdbc:h2:file:./data/barakat_mobile;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Namuna ma'lumotlarini birinchi ishga tushishda yuklash
app.seed.enabled=true

# ----- JWT -----
# Prod'da: SAVDOPRO_JWT_SECRET env bering (32+ belgi). Dev'da quyidagi fallback ishlatiladi.
app.jwt.secret=${SAVDOPRO_JWT_SECRET:dev-only-barakat-mobile-secret-change-me-0123456789}
app.jwt.ttl-hours=720

# ----- OTP -----
# dev=true bo'lsa kod javobda/logda ko'rinadi, SMS yuborilmaydi.
app.otp.dev-mode=true
app.otp.ttl-seconds=120
app.otp.length=4

# ----- Delivery (so'm) -----
app.delivery.fee=15000
app.delivery.free-threshold=300000

# ----- Logging -----
logging.level.uz.barakat.mobile=INFO

# --- POS katalog sinxroni (CatalogSyncService) ---
# Yoqish: CATALOG_SYNC_ENABLED=true + BASE_URL (masalan
# https://savdopro-host/api/v1) + Integrations sahifasida yaratilgan
# catalog:read scope'li API kalit. Narx: USD*kurs*markup, 100 so'mga yaxlit.
sync.enabled=${CATALOG_SYNC_ENABLED:false}
sync.base-url=${CATALOG_SYNC_BASE_URL:}
sync.api-key=${CATALOG_SYNC_API_KEY:}
sync.uzs-per-usd=${CATALOG_SYNC_UZS_PER_USD:12800}
sync.markup=${CATALOG_SYNC_MARKUP:1.0}
sync.cron=${CATALOG_SYNC_CRON:0 */30 * * * *}
