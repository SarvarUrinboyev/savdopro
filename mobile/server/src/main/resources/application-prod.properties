# ===== Barakat Market Mobile Backend (prod: PostgreSQL) =====
# Ishga tushirish: java -jar app.jar --spring.profiles.active=prod
# Yoki: ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod

spring.datasource.url=jdbc:postgresql://localhost:5432/barakat_mobile
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=false
app.otp.dev-mode=false
