# ===== Barakat Market Mobile Backend (prod: PostgreSQL) =====
# Ishga tushirish: java -jar app.jar --spring.profiles.active=prod
# Yoki: ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/barakat_mobile}
spring.datasource.username=${DB_USER:postgres}
# No default: the app refuses to start unless DB_PASSWORD is supplied, so a
# build can never ship to production with a guessable hard-coded password.
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Never let Hibernate mutate the production schema. `validate` checks the
# entities against the existing schema and fails fast on drift. (This module
# has no Flyway yet — provision the schema before first prod boot; see the
# go-live report's remaining-work section.)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.h2.console.enabled=false
app.otp.dev-mode=false
