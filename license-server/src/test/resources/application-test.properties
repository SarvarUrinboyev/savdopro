# ====================================================================
#  Test profile overlay — activate with @ActiveProfiles("test").
#  Base config is inherited from application.properties; here we swap in
#  a fresh in-memory H2 (so it never touches the dev license-data file or
#  its lock), a dev JWT secret, and a throwaway admin password.
# ====================================================================
spring.datasource.url=jdbc:h2:mem:license_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# 32+ char secret so JwtService boots without the dev-fallback opt-in.
savdopro.jwt.secret=test-license-jwt-secret-0123456789-abcdef-not-for-prod
savdopro.admin.password=LicTestAdmin2026

logging.level.org.flywaydb=WARN
