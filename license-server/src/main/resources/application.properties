# =====================================================================
#  SavdoPRO License Server
#
#  - Port 9090 (separate from a customer's local desktop backend at 8086)
#  - Dev: embedded H2 file in ./license-data.mv.db
#  - Prod (VPS): override SPRING_DATASOURCE_URL etc. to point at Postgres
# =====================================================================

spring.application.name=savdopro-license-server
server.port=${SERVER_PORT:9090}
# Bind address. Historically 0.0.0.0; in production set SERVER_ADDRESS=127.0.0.1
# so the JVM listens on loopback only and nginx is the sole ingress (the VPS
# firewall should also block 9090 from the outside — defence in depth).
server.address=${SERVER_ADDRESS:0.0.0.0}
# TLS terminates at nginx; honour X-Forwarded-Proto so request.isSecure() is
# true and Spring emits HSTS. Default "none" keeps dev/test on plain HTTP.
# Set FORWARD_HEADERS_STRATEGY=framework in the prod env file.
server.forward-headers-strategy=${FORWARD_HEADERS_STRATEGY:none}

# --- Trusted reverse proxy (X-Forwarded-For handling) ---
# Default fail-safe: X-Forwarded-For is IGNORED and the direct socket address
# is used, so a client cannot spoof its IP to dodge the login rate limiter or
# poison the audit log. On the VPS the app sits behind nginx/Caddy on the same
# host, so set TRUST_PROXY_HEADERS=true and TRUSTED_PROXY_CIDRS to the proxy's
# address (loopback) to recover real client IPs:
#   TRUST_PROXY_HEADERS=true
#   TRUSTED_PROXY_CIDRS=127.0.0.1/32,::1/128
app.proxy.trust-headers=${TRUST_PROXY_HEADERS:false}
app.proxy.trusted-cidrs=${TRUSTED_PROXY_CIDRS:}

# --- Database (H2 default; Postgres in production via env vars) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./license-data;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:LICENSE}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:LICENSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# --- JPA / Hibernate ---
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# Auto-heal the schema history when a migration's checksum changes
# during development. Safe in single-node deploys; if you ever go
# horizontal, flip this off and use a deliberate `flyway repair`.
spring.flyway.repair-on-migrate=true

# --- Auth ---
# JWT signing key. The desktop backend (port 8086) and this license server
# must sign / verify tokens with the SAME secret — a mismatch means login
# succeeds here but every subsequent /api/* call to the local backend
# returns 401 and the user gets bounced back to the login screen.
#
# Unset by default. JwtService refuses to boot unless SAVDOPRO_JWT_SECRET
# is a 32+ char random string. For local dev, set
# SAVDOPRO_ALLOW_DEV_SECRET=true to boot on the shared dev fallback
# (logs a loud WARN; never use in production).
savdopro.jwt.secret=${SAVDOPRO_JWT_SECRET:}
savdopro.admin.username=${SAVDOPRO_ADMIN_USER:admin}
savdopro.admin.password=${SAVDOPRO_ADMIN_PASSWORD:admin123}
savdopro.admin.full-name=${SAVDOPRO_ADMIN_NAME:Super Admin}

# --- Guarded demo login users (DemoUserSeeder). OFF by default; never under the
#     prod profile. With ALLOW_DEMO_SEED=true and a strong DEMO_SEED_PASSWORD it
#     creates demo_owner / demo_kassir / demo_owner_b on demo accounts 90001/90002. ---
app.demo-seed.enabled=${ALLOW_DEMO_SEED:false}

# --- Security alerts (optional) ---
# Telegram bot + chat id that gets pinged when LoginRateLimiter trips
# a lockout (10 failed logins from one IP in 5 minutes). Leave blank to
# disable — the system logs the lockout either way.
savdopro.license.alert.telegram.bot-token=${SAVDOPRO_LICENSE_ALERT_BOT_TOKEN:}
savdopro.license.alert.telegram.chat-id=${SAVDOPRO_LICENSE_ALERT_CHAT_ID:}

# --- Telegram OAuth login (optional) ---
# Bot token of the bot whose Login Widget you embed on the desktop /
# mobile sign-in screen. Different from the alert bot above (it can be
# the same bot, but you'd typically keep them separate so a leaked
# alert chat id can't be brute-forced into an OAuth grant). Leave
# blank to disable Telegram-based login entirely; the verifier then
# rejects every payload with a friendly "disabled" message.
savdopro.license.telegram-oauth.bot-token=${SAVDOPRO_LICENSE_TG_OAUTH_BOT_TOKEN:}
savdopro.license.telegram-oauth.bot-username=${SAVDOPRO_LICENSE_TG_OAUTH_BOT_USERNAME:}

# Google "Sign in with Google" (OAuth, account chooser). The client id is PUBLIC
# (the browser GIS widget exposes it anyway). Set SAVDOPRO_GOOGLE_CLIENT_ID to a
# Web-application OAuth client whose Authorized JS origin is this site's HTTPS
# host. Blank = the Google button stays off and /signup/config hides it.
savdopro.license.oauth.google.client-id=${SAVDOPRO_GOOGLE_CLIENT_ID:}
# Facebook Login (app id is public; secret verifies the token server-side). Needs
# Facebook App Review for the email permission before non-testers can sign in.
savdopro.license.oauth.facebook.app-id=${SAVDOPRO_FB_APP_ID:}
savdopro.license.oauth.facebook.app-secret=${SAVDOPRO_FB_APP_SECRET:}
# X (Twitter) OAuth2 + PKCE. Needs a (paid) X developer app; redirect-uri must be
# registered on the X app and match exactly. X returns no email.
savdopro.license.oauth.x.client-id=${SAVDOPRO_X_CLIENT_ID:}
savdopro.license.oauth.x.client-secret=${SAVDOPRO_X_CLIENT_SECRET:}
savdopro.license.oauth.x.redirect-uri=${SAVDOPRO_X_REDIRECT_URI:}

# --- Billing / PSP (optional) ---
# Shared-secret for the generic /api/billing/webhook stub. A real PSP adapter
# (below) verifies the provider's own signature instead of this header.
billing.webhook.secret=${BILLING_WEBHOOK_SECRET:}
#
# Click SHOP-API (docs.click.uz). The merchant gets these three from Click.
# Leave blank to disable Click checkout — /api/billing/checkout then rejects
# provider=CLICK with a clear "not configured" message. secret-key signs the
# Prepare/Complete callbacks; treat it like a password (never ship it client-side).
billing.click.service-id=${BILLING_CLICK_SERVICE_ID:}
billing.click.merchant-id=${BILLING_CLICK_MERCHANT_ID:}
billing.click.secret-key=${BILLING_CLICK_SECRET_KEY:}
billing.click.checkout-base-url=${BILLING_CLICK_CHECKOUT_BASE_URL:https://my.click.uz/services/pay}
billing.click.return-url=${BILLING_CLICK_RETURN_URL:}
#
# Payme (Paycom) Merchant API (developer.help.paycom.uz). merchant-key is the
# password Payme sends via HTTP Basic on its JSON-RPC callbacks — keep it secret.
# account-field is the order key you registered in the Payme cabinet (the field
# Payme echoes back inside "account"). Leave merchant-id / merchant-key blank to
# disable Payme checkout.
billing.payme.merchant-id=${BILLING_PAYME_MERCHANT_ID:}
billing.payme.merchant-key=${BILLING_PAYME_MERCHANT_KEY:}
billing.payme.account-field=${BILLING_PAYME_ACCOUNT_FIELD:order_id}
billing.payme.checkout-base-url=${BILLING_PAYME_CHECKOUT_BASE_URL:https://checkout.paycom.uz}

# --- Error tracking (Sentry, optional) ---
# Unhandled exceptions auto-report to Sentry once SENTRY_DSN is set; blank
# (the default) disables Sentry entirely. traces-sample-rate stays 0 (errors
# only); PII is never sent.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:production}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.0}
sentry.send-default-pii=false

# --- SMS provider (optional; default = log only) ---
# Default (sms.provider blank): OTP / reset codes are written to the server log
# (LoggingSmsProvider) — fine for dev. Set sms.provider=eskiz + the Eskiz cabinet
# credentials to send real SMS. The 'from' is your approved Eskiz sender nick
# (4546 is Eskiz's shared test sender).
sms.provider=${SMS_PROVIDER:}
sms.eskiz.email=${SMS_ESKIZ_EMAIL:}
sms.eskiz.password=${SMS_ESKIZ_PASSWORD:}
sms.eskiz.from=${SMS_ESKIZ_FROM:4546}
sms.eskiz.base-url=${SMS_ESKIZ_BASE_URL:https://notify.eskiz.uz}

# --- Logging ---
logging.level.root=INFO
logging.level.uz.barakat=INFO

# --- Actuator: DB-aware health + readiness/liveness probes for prod LB/uptime ---
# prometheus is exposed for scraping but secured to authenticated callers in
# SecurityConfig (health/info stay public). Scrape it with a service bearer
# token; for stricter isolation run it on a firewalled management port.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
