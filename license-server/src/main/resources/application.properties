# =====================================================================
#  SavdoPRO License Server
#
#  - Port 9090 (separate from a customer's local desktop backend at 8086)
#  - Dev: embedded H2 file in ./license-data.mv.db
#  - Prod (VPS): override SPRING_DATASOURCE_URL etc. to point at Postgres
# =====================================================================

spring.application.name=savdopro-license-server
server.port=${SERVER_PORT:9090}
# Bind to all interfaces so the VPS can serve external traffic; in dev
# this is fine because the listener is firewalled to the machine anyway.
server.address=${SERVER_ADDRESS:0.0.0.0}

# --- Database (H2 default; Postgres in production via env vars) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./license-data;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:LICENSE}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:LICENSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# --- JPA / Hibernate ---
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# Auto-heal the schema history when a migration's checksum changes
# during development. Safe in single-node deploys; if you ever go
# horizontal, flip this off and use a deliberate `flyway repair`.
spring.flyway.repair-on-migrate=true

# --- Auth ---
# JWT signing key. The desktop backend (port 8086) and this license server
# must sign / verify tokens with the SAME secret — a mismatch means login
# succeeds here but every subsequent /api/* call to the local backend
# returns 401 and the user gets bounced back to the login screen.
#
# Unset by default. JwtService refuses to boot unless SAVDOPRO_JWT_SECRET
# is a 32+ char random string. For local dev, set
# SAVDOPRO_ALLOW_DEV_SECRET=true to boot on the shared dev fallback
# (logs a loud WARN; never use in production).
savdopro.jwt.secret=${SAVDOPRO_JWT_SECRET:}
savdopro.admin.username=${SAVDOPRO_ADMIN_USER:admin}
savdopro.admin.password=${SAVDOPRO_ADMIN_PASSWORD:admin123}
savdopro.admin.full-name=${SAVDOPRO_ADMIN_NAME:Super Admin}

# --- Security alerts (optional) ---
# Telegram bot + chat id that gets pinged when LoginRateLimiter trips
# a lockout (10 failed logins from one IP in 5 minutes). Leave blank to
# disable — the system logs the lockout either way.
savdopro.license.alert.telegram.bot-token=${SAVDOPRO_LICENSE_ALERT_BOT_TOKEN:}
savdopro.license.alert.telegram.chat-id=${SAVDOPRO_LICENSE_ALERT_CHAT_ID:}

# --- Telegram OAuth login (optional) ---
# Bot token of the bot whose Login Widget you embed on the desktop /
# mobile sign-in screen. Different from the alert bot above (it can be
# the same bot, but you'd typically keep them separate so a leaked
# alert chat id can't be brute-forced into an OAuth grant). Leave
# blank to disable Telegram-based login entirely; the verifier then
# rejects every payload with a friendly "disabled" message.
savdopro.license.telegram-oauth.bot-token=${SAVDOPRO_LICENSE_TG_OAUTH_BOT_TOKEN:}

# --- Logging ---
logging.level.root=INFO
logging.level.uz.barakat=INFO

# --- Actuator: DB-aware health + readiness/liveness probes for prod LB/uptime ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
