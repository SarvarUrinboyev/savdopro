<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>SavdoPRO License Server — Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
        rel="stylesheet" />
  <style>
    :root {
      --bg: #03050a;
      --surface: #0b0f19;
      --surface-2: #11182a;
      --border: rgba(255, 255, 255, .06);
      --border-strong: rgba(255, 255, 255, .12);
      --text: #f5f7fb;
      --text-muted: #94a3b8;
      --text-faint: #64748b;
      --accent: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background:
        radial-gradient(58% 46% at 22% 0%, rgba(16, 185, 129, .14), transparent 70%),
        radial-gradient(48% 40% at 100% 100%, rgba(34, 211, 238, .08), transparent 70%),
        var(--bg);
      color: var(--text);
    }

    /* ====== Layout ====== */
    .shell { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .center { width: 100%; max-width: 1180px; }

    /* ====== Login card ====== */
    .login-card {
      max-width: 420px; margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      padding: 32px 30px 26px;
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, .55),
                  0 0 0 1px rgba(16, 185, 129, .08);
    }
    .login-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .login-brand svg { width: 48px; height: 48px; border-radius: 13px;
      box-shadow: 0 10px 22px -10px rgba(16, 185, 129, .55); }
    .login-brand h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -.02em; }
    .login-brand p { margin: 2px 0 0; font-size: 11px; font-weight: 700;
      color: var(--text-faint); text-transform: uppercase; letter-spacing: .1em; }
    .login-card h2 { font-size: 20px; font-weight: 800; margin: 10px 0 4px; }
    .login-card .sub { font-size: 12px; color: var(--text-muted); margin: 0 0 18px; }

    /* ====== Inputs ====== */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    label { font-size: 10px; font-weight: 800; letter-spacing: .14em;
            text-transform: uppercase; color: var(--text-faint); }
    .input, .select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font: inherit; font-size: 14px;
      outline: none;
      transition: border-color .12s;
    }
    .input:focus, .select:focus { border-color: var(--accent); }
    .password-row { position: relative; }
    .password-row .input { padding-right: 44px; }
    .password-toggle {
      position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
      background: transparent; border: 0; cursor: pointer;
      width: 32px; height: 32px; display: grid; place-items: center;
      border-radius: 7px; font-size: 16px; color: var(--text-muted);
    }

    /* ====== Buttons ====== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 14px; border-radius: 10px; cursor: pointer;
      border: 1px solid var(--border);
      font: inherit; font-weight: 700; font-size: 13px;
      transition: filter .12s, background .12s, border-color .12s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: #fff; border: none;
      box-shadow: 0 8px 18px -10px rgba(16, 185, 129, .55);
    }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .btn-ghost:hover { color: var(--text); background: var(--surface-2); }
    .btn-danger { color: var(--red); border-color: rgba(239, 68, 68, .28);
                  background: rgba(239, 68, 68, .08); }
    .btn-block { width: 100%; padding: 12px; font-size: 14px; }
    .btn-sm { padding: 6px 10px; font-size: 11px; }

    /* ====== Admin page ====== */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; margin-bottom: 18px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px;
    }
    .topbar .brand { display: flex; align-items: center; gap: 10px; }
    .topbar .brand svg { width: 32px; height: 32px; border-radius: 9px; }
    .topbar .brand strong { font-size: 14px; font-weight: 800; }
    .topbar .me { display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .topbar .me-name { color: var(--text-muted); }

    .tabs { display: flex; gap: 6px; margin-bottom: 16px;
            border-bottom: 1px solid var(--border); padding-left: 2px; }
    .tab {
      background: none; border: none;
      color: var(--text-muted);
      padding: 10px 16px;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--brand); border-bottom-color: var(--brand); }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
             margin-bottom: 18px; }
    @media (max-width: 720px) { .stats { grid-template-columns: 1fr; } }
    .stat {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px;
    }
    .stat .eyebrow {
      display: inline-block; padding: 4px 8px; border-radius: 999px;
      font-size: 9.5px; font-weight: 800; letter-spacing: .14em;
      text-transform: uppercase;
    }
    .stat .v { font-size: 28px; font-weight: 800; margin-top: 6px; }
    .stat.green .eyebrow { color: #10b981; background: rgba(16, 185, 129, .12); border: 1px solid rgba(16, 185, 129, .35); }
    .stat.green .v { color: #10b981; }
    .stat.blue .eyebrow { color: #3b82f6; background: rgba(59, 130, 246, .12); border: 1px solid rgba(59, 130, 246, .35); }
    .stat.blue .v { color: #3b82f6; }
    .stat.red .eyebrow { color: var(--red); background: rgba(239, 68, 68, .12); border: 1px solid rgba(239, 68, 68, .35); }
    .stat.red .v { color: var(--red); }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 0; overflow: hidden;
    }
    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border);
    }
    .card-head h2 { font-size: 14px; font-weight: 800; margin: 0; }

    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th, .tbl td {
      padding: 10px 14px; text-align: left; font-size: 13px;
      border-top: 1px solid var(--border);
    }
    .tbl th { font-size: 10px; font-weight: 800; letter-spacing: .12em;
              text-transform: uppercase; color: var(--text-faint);
              border-top: 0; }
    .tbl tr:hover td { background: rgba(16, 185, 129, .03); }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 800; padding: 3px 8px;
      border-radius: 999px; border: 1px solid transparent;
    }
    .badge.ok    { color: #10b981; background: rgba(16, 185, 129, .10); border-color: rgba(16, 185, 129, .28); }
    .badge.warn  { color: var(--amber); background: rgba(245, 158, 11, .10); border-color: rgba(245, 158, 11, .28); }
    .badge.block { color: var(--red); background: rgba(239, 68, 68, .10); border-color: rgba(239, 68, 68, .28); }
    .row-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 7px;
      background: transparent; border: 1px solid var(--border);
      cursor: pointer; color: var(--text-muted); font-size: 14px;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--border-strong); }
    .icon-btn.danger:hover { color: var(--red); border-color: rgba(239, 68, 68, .35); }

    /* ====== Modal ====== */
    .overlay {
      position: fixed; inset: 0; background: rgba(3, 5, 10, .72);
      backdrop-filter: blur(10px);
      display: grid; place-items: center; padding: 20px; z-index: 50;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border-strong);
      border-radius: 18px; width: 100%; max-width: 540px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, .55);
    }
    .modal-head { padding: 16px 20px; border-bottom: 1px solid var(--border);
                  display: flex; align-items: center; justify-content: space-between; }
    .modal-head h3 { margin: 0; font-size: 16px; font-weight: 800; }
    .modal-body { padding: 18px 20px; }
    .modal-foot { padding: 14px 20px; border-top: 1px solid var(--border);
                  display: flex; justify-content: flex-end; gap: 8px; }
    .x-btn { background: transparent; border: 0; color: var(--text-faint);
             cursor: pointer; font-size: 22px; line-height: 1; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ====== Toast ====== */
    .toast {
      position: fixed; bottom: 18px; right: 18px; z-index: 200;
      background: var(--surface); border: 1px solid var(--border-strong);
      border-left: 3px solid var(--accent);
      border-radius: 10px; padding: 12px 16px;
      box-shadow: 0 16px 40px -16px rgba(0, 0, 0, .55);
      font-size: 13px; font-weight: 700;
      opacity: 0; transform: translateY(20px); transition: all .2s;
      pointer-events: none; max-width: 360px;
    }
    .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.error { border-left-color: var(--red); color: var(--red); }

    .error-line {
      background: rgba(239, 68, 68, .10); color: var(--red);
      border: 1px solid rgba(239, 68, 68, .28);
      border-radius: 10px; padding: 10px 12px;
      font-size: 12.5px; font-weight: 600;
      margin-top: 8px;
    }
    .hidden { display: none !important; }
    .muted { color: var(--text-muted); }
    .mono { font-family: ui-monospace, Menlo, monospace; }
  </style>
</head>
<body>
  <div id="app" class="shell"></div>

  <div id="toast" class="toast"></div>

  <script>
    // ============================================================ state
    const TOKEN_KEY = 'savdopro.license.token';
    const state = {
      user: null,
      accounts: [],
      tab: 'accounts',   // 'accounts' | 'audit'
      audit: [],          // last-loaded audit page
      auditLoading: false,
      modal: null,        // { type, item }
    };

    // ============================================================ api
    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function setToken(t) {
      if (t) localStorage.setItem(TOKEN_KEY, t);
      else localStorage.removeItem(TOKEN_KEY);
    }

    async function api(method, path, body) {
      const opts = { method, headers: {} };
      if (body !== undefined) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const token = getToken();
      if (token) opts.headers.Authorization = 'Bearer ' + token;
      let res;
      try {
        res = await fetch(path, opts);
      } catch (e) {
        throw new Error("Server bilan bog'lana olmadim");
      }
      if (res.status === 401 || res.status === 403) {
        setToken(null);
        state.user = null;
        render();
        throw new Error('Sessiya tugagan, qayta kiring');
      }
      if (res.status === 204) return null;
      const text = await res.text();
      const data = text ? JSON.parse(text) : null;
      if (!res.ok) {
        const msg = data?.message || data?.detail || data?.title
          || ('Xatolik ' + res.status);
        throw new Error(msg);
      }
      return data;
    }

    // ============================================================ toast
    let toastTimer = null;
    function toast(msg, isError) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.toggle('error', !!isError);
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ============================================================ rendering
    function render() {
      const app = document.getElementById('app');
      if (!state.user) {
        app.innerHTML = loginView();
        wireLogin();
      } else {
        app.innerHTML = adminView();
        wireAdmin();
      }
      // Modal layer
      const old = document.querySelector('.overlay');
      if (old) old.remove();
      if (state.modal) {
        const overlay = document.createElement('div');
        overlay.className = 'overlay';
        overlay.innerHTML = renderModal(state.modal);
        overlay.addEventListener('mousedown', (e) => {
          if (e.target === overlay) closeModal();
        });
        document.body.appendChild(overlay);
        wireModal(state.modal);
      }
    }

    function closeModal() {
      state.modal = null;
      render();
    }

    // ============================================================ brand SVG
    // Single inline copy so the panel can be served by any host without
    // an extra round-trip for a logo asset. Mirrors .logos/logo3.svg.
    const BRAND_SVG = `
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <defs>
          <linearGradient id="brandG" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0%" stop-color="#1e3a8a"/>
            <stop offset="100%" stop-color="#3b82f6"/>
          </linearGradient>
        </defs>
        <rect width="40" height="40" rx="9" fill="url(#brandG)"/>
        <rect x="9" y="23.5" width="6.25" height="8.3" rx="1.7"
              fill="#ffffff" opacity="0.42"/>
        <rect x="16.9" y="19" width="6.25" height="12.65" rx="1.7"
              fill="#ffffff" opacity="0.62"/>
        <rect x="24.7" y="13.6" width="6.25" height="18.1" rx="1.7" fill="#22c55e"/>
        <path d="M12.2 20.5 L20 15.8 L28.1 10.9" fill="none"
              stroke="#ffffff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M24.7 10.9 L28.1 10.9 L28.1 14.4" fill="none"
              stroke="#ffffff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;

    // ============================================================ login
    function loginView() {
      return `
        <div class="center">
          <div class="login-card">
            <div class="login-brand">
              ${BRAND_SVG}
              <div>
                <h1>SavdoPRO License</h1>
                <p>Markaziy admin panel</p>
              </div>
            </div>
            <h2>Tizimga kirish</h2>
            <p class="sub">Akkauntingiz uchun login va parolni kiriting</p>
            <form id="loginForm">
              <div class="field">
                <label>Login</label>
                <input class="input" id="lgUser" autocomplete="username" autofocus />
              </div>
              <div class="field">
                <label>Parol</label>
                <div class="password-row">
                  <input class="input" id="lgPass" type="password" autocomplete="current-password" />
                  <button type="button" class="password-toggle" id="lgPwToggle"
                          title="Ko'rsatish">👁</button>
                </div>
              </div>
              <div id="lgErr" class="error-line hidden"></div>
              <button type="submit" class="btn btn-primary btn-block">Kirish</button>
            </form>
          </div>
        </div>`;
    }

    function wireLogin() {
      const form = document.getElementById('loginForm');
      const err = document.getElementById('lgErr');
      const pwToggle = document.getElementById('lgPwToggle');
      const pwInput = document.getElementById('lgPass');
      pwToggle.addEventListener('click', () => {
        const t = pwInput.type === 'password' ? 'text' : 'password';
        pwInput.type = t;
        pwToggle.textContent = t === 'text' ? '🙈' : '👁';
      });
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        err.classList.add('hidden');
        const username = document.getElementById('lgUser').value.trim();
        const password = document.getElementById('lgPass').value;
        if (!username || !password) {
          err.textContent = 'Login va parolni kiriting';
          err.classList.remove('hidden');
          return;
        }
        try {
          const r = await api('POST', '/api/auth/login', { username, password });
          setToken(r.token);
          state.user = r.user;
          await loadAccounts();
          render();
        } catch (ex) {
          err.textContent = ex.message;
          err.classList.remove('hidden');
        }
      });
    }

    // ============================================================ admin
    async function loadAccounts() {
      try {
        state.accounts = await api('GET', '/api/admin/accounts');
      } catch (ex) {
        toast(ex.message, true);
      }
    }

    function adminView() {
      return `
        <div class="center">
          <div class="topbar">
            <div class="brand">${BRAND_SVG}<strong>SavdoPRO License Server</strong></div>
            <div class="me">
              <span class="me-name">${esc(state.user.fullName || state.user.username)}</span>
              <button class="btn btn-ghost btn-sm" id="logoutBtn">Chiqish</button>
            </div>
          </div>

          <div class="tabs">
            <button class="tab ${state.tab === 'accounts' ? 'active' : ''}"
                    data-tab="accounts">🏪 Akkauntlar</button>
            <button class="tab ${state.tab === 'audit' ? 'active' : ''}"
                    data-tab="audit">📜 Audit log</button>
          </div>

          ${state.tab === 'audit' ? renderAuditTab() : renderAccountsTab()}
        </div>`;
    }

    function renderAccountsTab() {
      const total = state.accounts.length;
      const blocked = state.accounts.filter(a => a.blocked || a.expired).length;
      const active = total - blocked;
      const rows = state.accounts.map(accountRow).join('');
      return `
        <div class="stats">
          <div class="stat green"><span class="eyebrow">Jami akkauntlar</span><div class="v">${total}</div></div>
          <div class="stat blue"><span class="eyebrow">Faol</span><div class="v">${active}</div></div>
          <div class="stat red"><span class="eyebrow">Bloklangan / muddati tugagan</span><div class="v">${blocked}</div></div>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>Mijoz akkauntlari</h2>
            <button class="btn btn-primary btn-sm" id="newAccountBtn">+ Yangi akkaunt</button>
          </div>
          <table class="tbl">
            <thead>
              <tr>
                <th>Akkaunt</th><th>Telefon</th><th>Obuna tugashi</th>
                <th>Userlar</th><th>Holat</th><th></th>
              </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="6" class="muted" style="text-align:center;padding:30px">Hozircha akkaunt yo&rsquo;q</td></tr>'}</tbody>
          </table>
        </div>`;
    }

    /** Map action codes to short Uzbek labels for the audit table. */
    const ACTION_LABEL = {
      ACCOUNT_CREATE:      { label: "Akkaunt yaratildi",    cls: 'ok' },
      ACCOUNT_UPDATE:      { label: "Akkaunt yangilandi",   cls: 'info' },
      ACCOUNT_BLOCK:       { label: "Akkaunt bloklandi",    cls: 'block' },
      ACCOUNT_UNBLOCK:     { label: "Bloк olib tashlandi",  cls: 'ok' },
      ACCOUNT_DELETE:      { label: "Akkaunt o'chirildi",   cls: 'block' },
      USER_CREATE:         { label: "Foydalanuvchi qo'shildi", cls: 'ok' },
      USER_DELETE:         { label: "Foydalanuvchi o'chirildi", cls: 'block' },
      USER_RESET_PASSWORD: { label: "Parol o'rnatildi",     cls: 'warn' },
    };

    function renderAuditTab() {
      if (state.auditLoading) {
        return `<div class="card"><div class="muted" style="text-align:center;padding:36px">⏳ Yuklanmoqda...</div></div>`;
      }
      const rows = state.audit.map(row => {
        const meta = ACTION_LABEL[row.action]
                  || { label: row.action, cls: 'info' };
        const when = (row.createdAt || '').replace('T', ' ').slice(0, 19);
        return `
          <tr>
            <td class="mono" style="font-size:11px;color:var(--muted)">${esc(when)}</td>
            <td><span class="badge ${meta.cls}">${esc(meta.label)}</span></td>
            <td>${esc(row.targetLabel || (row.targetType + ' #' + (row.targetId ?? '?')))}</td>
            <td class="muted">${esc(row.actorName)}</td>
            <td class="mono" style="font-size:11px;color:var(--muted)">${esc(row.clientIp || '—')}</td>
            <td class="muted" style="font-size:12px">${esc(row.detail || '')}</td>
          </tr>`;
      }).join('');
      return `
        <div class="card">
          <div class="card-head">
            <h2>📜 Audit log <span class="muted" style="font-weight:400;font-size:12px">— so'nggi 50 ta amal</span></h2>
            <button class="btn btn-ghost btn-sm" id="auditReloadBtn">🔄 Yangilash</button>
          </div>
          <table class="tbl">
            <thead>
              <tr>
                <th style="width:140px">Vaqt</th>
                <th style="width:170px">Amal</th>
                <th>Maqsad</th>
                <th style="width:120px">Kim</th>
                <th style="width:110px">IP</th>
                <th>Tafsilot</th>
              </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="6" class="muted" style="text-align:center;padding:30px">Audit yozuvi yo&rsquo;q</td></tr>'}</tbody>
          </table>
        </div>`;
    }

    async function loadAudit() {
      state.auditLoading = true;
      render();
      try {
        state.audit = await api('GET', '/api/admin/audit?page=0&size=50');
      } catch (ex) {
        toast(ex.message, true);
      } finally {
        state.auditLoading = false;
        render();
      }
    }

    function accountRow(a) {
      const expDate = a.subscriptionExpires || '∞';
      let status;
      if (a.blocked) status = '<span class="badge block">🚫 Bloklangan</span>';
      else if (a.expired) status = '<span class="badge warn">⏰ Tugagan</span>';
      else status = '<span class="badge ok">✓ Faol</span>';
      const warn = (!a.expired && a.subscriptionExpires && a.daysUntilBlock <= 4)
        ? ` <span class="badge warn">${a.daysUntilBlock} kun</span>` : '';
      return `
        <tr>
          <td><strong>${esc(a.name)}</strong>${a.contactNote
              ? `<div class="muted" style="font-size:11px">${esc(a.contactNote)}</div>` : ''}</td>
          <td class="muted mono">${esc(a.contactPhone || '—')}</td>
          <td class="mono">${expDate}${warn}</td>
          <td class="mono">${a.userCount}</td>
          <td>${status}</td>
          <td>
            <div class="row-actions">
              <button class="icon-btn" data-action="edit" data-id="${a.id}" title="Tahrirlash">✏️</button>
              <button class="icon-btn" data-action="users" data-id="${a.id}" title="Userlar">👥</button>
              <button class="icon-btn" data-action="${a.blocked ? 'unblock' : 'block'}" data-id="${a.id}"
                      title="${a.blocked ? 'Ochish' : 'Bloklash'}"
                      ${a.id === 1 ? 'disabled' : ''}>${a.blocked ? '🔓' : '🔒'}</button>
              <button class="icon-btn danger" data-action="delete" data-id="${a.id}"
                      title="O'chirish" ${a.id === 1 ? 'disabled' : ''}>🗑</button>
            </div>
          </td>
        </tr>`;
    }

    function wireAdmin() {
      document.getElementById('logoutBtn').addEventListener('click', () => {
        setToken(null);
        state.user = null;
        render();
      });
      // Tab switcher wired here so the click handler survives every
      // re-render of the admin shell.
      document.querySelectorAll('button[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          state.tab = btn.dataset.tab;
          if (state.tab === 'audit') {
            loadAudit();   // fires its own render
          } else {
            render();
          }
        });
      });
      // Below this point: only wire the controls that belong to the
      // currently-active tab — they're the only ones in the DOM.
      if (state.tab === 'accounts') {
        const newBtn = document.getElementById('newAccountBtn');
        if (newBtn) newBtn.addEventListener('click', () => {
          state.modal = { type: 'create' };
          render();
        });
        document.querySelectorAll('button[data-action]').forEach(btn => {
          if (btn.disabled) return;
          btn.addEventListener('click', () => handleAction(btn.dataset.action, Number(btn.dataset.id)));
        });
      }
      if (state.tab === 'audit') {
        const reload = document.getElementById('auditReloadBtn');
        if (reload) reload.addEventListener('click', () => loadAudit());
      }
    }

    async function handleAction(action, id) {
      const acc = state.accounts.find(a => a.id === id);
      if (!acc) return;
      if (action === 'edit') {
        state.modal = { type: 'edit', item: acc };
        render();
      } else if (action === 'users') {
        try {
          const detail = await api('GET', `/api/admin/accounts/${id}`);
          state.modal = { type: 'users', item: detail.account, users: detail.users };
          render();
        } catch (e) { toast(e.message, true); }
      } else if (action === 'block' || action === 'unblock') {
        try {
          await api('PATCH', `/api/admin/accounts/${id}/block`, { blocked: action === 'block' });
          toast(action === 'block' ? 'Akkaunt bloklandi' : 'Akkaunt ochildi');
          await loadAccounts();
          render();
        } catch (e) { toast(e.message, true); }
      } else if (action === 'delete') {
        if (!confirm(`"${acc.name}" akkauntini o'chirishni tasdiqlaysizmi?`)) return;
        try {
          await api('DELETE', `/api/admin/accounts/${id}`);
          toast("Akkaunt o'chirildi");
          await loadAccounts();
          render();
        } catch (e) { toast(e.message, true); }
      }
    }

    // ============================================================ modals
    function renderModal(modal) {
      if (modal.type === 'create')      return modalCreateAccount();
      if (modal.type === 'edit')        return modalEditAccount(modal.item);
      if (modal.type === 'users')       return modalUsers(modal.item, modal.users);
      if (modal.type === 'addUser')     return modalAddUser(modal.item);
      if (modal.type === 'resetPw')     return modalResetPw(modal.user);
      if (modal.type === 'credentials') return modalCredentials(modal.data);
      return '';
    }

    function modalResetPw(user) {
      return `

          <div class="modal-body">

    /**
     * Post-action confirmation: shows the login + password the licensor
     * just SET so they can copy/share. Plaintext is held in browser
     * memory only — the License Server stores the BCrypt hash, not the
     * plaintext, so once this modal is closed the value is unrecoverable
     * without another reset.
     */
    function modalCredentials({ title, subtitle, username, password, returnTo }) {
      return `
        <div class="modal" style="max-width:480px">
          <div class="modal-head"><h3>${esc(title)}</h3>
            <button class="x-btn" id="mClose">×</button></div>
          <div class="modal-body">
            <p style="margin:0 0 14px;font-size:13px;color:#10b981;font-weight:600">
              ✓ ${esc(subtitle || 'Tayyor')}
            </p>
            <div style="background:rgba(16,185,129,0.08);
                        border:1px solid rgba(16,185,129,0.25);
                        border-radius:10px;padding:14px;margin-bottom:14px">
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.8px;
                          color:#10b981;font-weight:700;margin-bottom:4px">LOGIN</div>
              <div style="font-family:'JetBrains Mono',Consolas,monospace;
                          font-size:18px;font-weight:700;margin-bottom:14px;
                          word-break:break-all">${esc(username)}</div>
              <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.8px;
                          color:#10b981;font-weight:700;margin-bottom:4px">PAROL</div>
              <div style="font-family:'JetBrains Mono',Consolas,monospace;
                          font-size:18px;font-weight:700;
                          word-break:break-all">${esc(password)}</div>
            </div>
            <p class="muted" style="margin:0;font-size:12px">
              ⚠️ Parol bu modalni yopgandan keyin yana ko'rinmaydi. Hozir nusxalang
              yoki mijozga jo'nating. Unutib qo'ysangiz — qaytadan o'rnating.
            </p>
          </div>
          <div class="modal-foot">
            <button class="btn btn-ghost" id="crCopy"
                    data-login="${esc(username)}" data-pw="${esc(password)}">
              📋 Login + parolni nusxalash
            </button>
            <button class="btn btn-primary" id="crDone"
                    data-return="${esc(returnTo || '')}">✓ Tayyor</button>
          </div>
        </div>`;
    }

    /** 12-char password: easy to read (no 0/O/1/l), enough entropy for SaaS-tier auth. */
    function generatePassword() {
      const charset = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
      const arr = new Uint32Array(12);
      crypto.getRandomValues(arr);
      let out = '';
      for (let i = 0; i < arr.length; i += 1) out += charset[arr[i] % charset.length];
      return out;
    }

    /** Best-effort clipboard copy with a fallback for old Electron / IE. */
    async function copyToClipboard(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch (_) { /* fall through to legacy path */ }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      let ok = false;
      try { ok = document.execCommand('copy'); } catch (_) { ok = false; }
      document.body.removeChild(ta);
      return ok;
    }

    function wireModal(modal) {
      const closeBtns = ['mClose', 'mCancel'];
      closeBtns.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('click', closeModal);
      });

      if (modal.type === 'create') {
        document.getElementById('caSubmit').addEventListener('click', async () => {
          const name = document.getElementById('caName').value.trim();
          const ownerUsername = document.getElementById('caUser').value.trim();
          const ownerPassword = document.getElementById('caPass').value;
          if (!name || !ownerUsername || !ownerPassword) {
            showErr('caErr', 'Akkaunt nomi, login va parolni kiriting');
            return;
          }
          const days = Number(document.getElementById('caDays').value);
          const expires = days > 0
            ? new Date(Date.now() + days * 86400000).toISOString().slice(0, 10)
            : null;
          try {
            await api('POST', '/api/admin/accounts', {
              name,
              contactPhone: document.getElementById('caPhone').value.trim() || null,
              contactNote: document.getElementById('caNote').value.trim() || null,
              subscriptionExpires: expires,
              ownerUsername,
              ownerPassword,
              ownerFullName: document.getElementById('caFull').value.trim() || null,
            });
            toast('Akkaunt yaratildi');
            await loadAccounts();
            // Show the credentials prominently so the licensor can
            // copy them and hand to the customer.
            state.modal = {
              type: 'credentials',
              data: {
                title: 'Akkaunt yaratildi',
                subtitle: `"${name}" akkaunti uchun owner-foydalanuvchi tayyor`,
                username: ownerUsername,
                password: ownerPassword,
                returnTo: '',
              },
            };
            render();
          } catch (e) { showErr('caErr', e.message); }
        });
        // "Tasodifiy parol" helper in the create-account form
        const caGen = document.getElementById('caGen');
        if (caGen) {
          caGen.addEventListener('click', () => {
            document.getElementById('caPass').value = generatePassword();
          });
        }
      }

      if (modal.type === 'edit') {
        const expInput = document.getElementById('eaExp');
        document.querySelectorAll('button[data-extend]').forEach(btn => {
          btn.addEventListener('click', () => {
            const days = Number(btn.dataset.extend);
            const base = expInput.value ? new Date(`${expInput.value}T00:00:00`) : new Date();
            expInput.value = new Date(base.getTime() + days * 86400000).toISOString().slice(0, 10);
          });
        });
        document.getElementById('eaInf').addEventListener('click', () => { expInput.value = ''; });
        document.getElementById('eaSubmit').addEventListener('click', async () => {
          const id = Number(modal.item.id);
          const name = document.getElementById('eaName').value.trim();
          if (!name) { showErr('eaErr', 'Akkaunt nomi kiritilishi shart'); return; }
          try {
            await api('PUT', `/api/admin/accounts/${id}`, {
              name,
              contactPhone: document.getElementById('eaPhone').value.trim() || null,
              contactNote: document.getElementById('eaNote').value.trim() || null,
              subscriptionExpires: expInput.value || null,
            });
            toast('Akkaunt yangilandi');
            await loadAccounts();
            closeModal();
          } catch (e) { showErr('eaErr', e.message); }
        });
      }

      if (modal.type === 'users') {
        document.getElementById('addUserBtn').addEventListener('click', () => {
          state.modal = { type: 'addUser', item: modal.item, parentUsers: modal.users };
          render();
        });
        document.querySelectorAll('button[data-user-action]').forEach(btn => {
          if (btn.disabled) return;
          btn.addEventListener('click', async () => {
            const action = btn.dataset.userAction;
            const uid = Number(btn.dataset.uid);
            if (action === 'resetPw') {
              const user = modal.users.find(u => u.id === uid);
              state.modal = { type: 'resetPw', user, parentItem: modal.item };
              render();
            } else if (action === 'delete') {
              if (!confirm("Foydalanuvchini o'chirishni tasdiqlaysizmi?")) return;
              try {
                await api('DELETE', `/api/admin/users/${uid}`);
                toast("Foydalanuvchi o'chirildi");
                // Reload the account detail
                const detail = await api('GET', `/api/admin/accounts/${modal.item.id}`);
                state.modal = { type: 'users', item: detail.account, users: detail.users };
                await loadAccounts();
                render();
              } catch (e) { toast(e.message, true); }
            }
          });
        });
      }

      if (modal.type === 'addUser') {
        const auGen = document.getElementById('auGen');
        if (auGen) {
          auGen.addEventListener('click', () => {
            document.getElementById('auPass').value = generatePassword();
          });
        }
        document.getElementById('auSubmit').addEventListener('click', async () => {
          const id = Number(modal.item.id);
          const username = document.getElementById('auUser').value.trim();
          const password = document.getElementById('auPass').value;
          if (!username || !password) { showErr('auErr', 'Login va parolni kiriting'); return; }
          try {
            await api('POST', `/api/admin/accounts/${id}/users`, {
              username, password,
              fullName: document.getElementById('auFull').value.trim() || null,
              role: document.getElementById('auRole').value,
            });
            toast("Foydalanuvchi qo'shildi");
            await loadAccounts();
            // Pop the creds confirmation so the licensor can copy and
            // share. "✓ Tayyor" returns to the users list of this account.
            state.modal = {
              type: 'credentials',
              data: {
                title: "Foydalanuvchi qo'shildi",
                subtitle: `${modal.item.name} akkauntiga yangi foydalanuvchi qo'shildi`,
                username,
                password,
                returnTo: `users:${id}`,
              },
            };
            render();
          } catch (e) { showErr('auErr', e.message); }
        });
      }

      if (modal.type === 'resetPw') {
        const genBtn = document.getElementById('rpGen');
        if (genBtn) {
          genBtn.addEventListener('click', () => {
            document.getElementById('rpVal').value = generatePassword();
          });
        }
        document.getElementById('rpSubmit').addEventListener('click', async () => {
          const uid = Number(modal.user.id);
          const uname = modal.user.username;
          const pw = document.getElementById('rpVal').value;
          if (!pw || pw.length < 4) { showErr('rpErr', "Kamida 4 ta belgi kiriting"); return; }
          try {
            await api('PATCH', `/api/admin/users/${uid}/password`, { password: pw });
            toast('Parol o\'rnatildi');
            // Stash the parent account id so the "✓ Tayyor" button can take
            // us back to the users list (instead of dumping to the account
            // grid where the licensor would lose context).
            state.modal = {
              type: 'credentials',
              data: {
                title: "Parol o'rnatildi",
                subtitle: `${uname} uchun yangi parol tayyor`,
                username: uname,
                password: pw,
                returnTo: modal.parentItem ? `users:${modal.parentItem.id}` : '',
              },
            };
            render();
          } catch (e) { showErr('rpErr', e.message); }
        });
      }

      if (modal.type === 'credentials') {
        const copyBtn = document.getElementById('crCopy');
        copyBtn.addEventListener('click', async () => {
          const login = copyBtn.dataset.login;
          const pw = copyBtn.dataset.pw;
          const ok = await copyToClipboard(`Login: ${login}\nParol: ${pw}`);
          toast(ok ? '✓ Nusxalandi' : 'Nusxalashda xatolik', !ok);
        });
        document.getElementById('crDone').addEventListener('click', async () => {
          const ret = document.getElementById('crDone').dataset.return || '';
          if (ret.startsWith('users:')) {
            const accId = Number(ret.slice(6));
            try {
              const detail = await api('GET', `/api/admin/accounts/${accId}`);
              state.modal = { type: 'users', item: detail.account, users: detail.users };
              render();
              return;
            } catch (_) { /* fall through to plain close */ }
          }
          closeModal();
        });
      }
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ============================================================ bootstrap
    (async function init() {
      if (getToken()) {
        try {
          state.user = await api('GET', '/api/auth/me');
          await loadAccounts();
        } catch (e) {
          setToken(null);
          state.user = null;
        }
      }
      render();
    })();
  </script>
