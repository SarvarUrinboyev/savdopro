# =====================================================================
#  SavdoPRO monitoring stack — Prometheus + Grafana (+ optional Uptime Kuma).
#
#  Runs NEXT TO the app (systemd jars or the main docker-compose) and scrapes
#  /actuator/prometheus on both services with the static METRICS_SCRAPE_TOKEN.
#
#  Quick start (on the droplet, in ops/monitoring/):
#    cp .env.example .env                         # set Grafana password + Telegram
#    mkdir -p secrets && printf '%s' "$METRICS_SCRAPE_TOKEN" > secrets/scrape-token
#    docker compose -f docker-compose.monitoring.yml up -d
#
#  UIs are bound to 127.0.0.1 ON PURPOSE (the droplet firewall only opens
#  22/80/443). Reach them over an SSH tunnel:
#    ssh -L 3001:localhost:3001 -L 9091:localhost:9091 root@<droplet>
#  then open http://localhost:3001 (Grafana) / http://localhost:9091 (Prometheus).
#
#  Optional Uptime Kuma (simple HTTP uptime probes + Telegram):
#    docker compose -f docker-compose.monitoring.yml --profile kuma up -d
# =====================================================================

name: savdopro-monitoring

services:
  prometheus:
    image: prom/prometheus:v2.53.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # The scrape token file (gitignored). Same value as METRICS_SCRAPE_TOKEN
      # in /etc/savdopro/backend.env and license.env.
      - ./secrets/scrape-token:/etc/prometheus/scrape-token:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Lets the container reach services listening on the host's loopback
      # (systemd jars bind 127.0.0.1:8086 / 127.0.0.1:9090).
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:9091:9090"

  grafana:
    image: grafana/grafana:11.1.4
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?set GF_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      # Telegram alert channel (leave empty to run without alert delivery;
      # rules still evaluate and show in the UI).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALERT_CHAT_ID: ${TELEGRAM_ALERT_CHAT_ID:-}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"

  # Lightweight uptime probes with their own Telegram alerting — optional,
  # complements Prometheus (external-view HTTP checks incl. the public HTTPS
  # endpoint through nginx). Configure monitors in its UI on first run.
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    profiles: ["kuma"]
    volumes:
      - kuma-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3002:3001"

volumes:
  prometheus-data:
  grafana-data:
  kuma-data:
