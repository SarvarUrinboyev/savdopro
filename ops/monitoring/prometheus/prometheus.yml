# Prometheus scrape config for the SavdoPRO droplet.
#
# Both jobs authenticate with the static scrape token (see
# MetricsScrapeTokenFilter in each service). The token is mounted as a file
# because prometheus.yml does not expand environment variables.
#
# Targets use host.docker.internal (mapped to the host gateway in
# docker-compose.monitoring.yml) because the app jars listen on the host's
# loopback, not inside this compose network. If you run the app via the main
# docker-compose instead, switch targets to backend:8086 / license-server:9090
# and attach this stack to that compose network.

global:
  scrape_interval: 15s
  evaluation_interval: 30s

scrape_configs:
  - job_name: savdopro-backend
    metrics_path: /actuator/prometheus
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/scrape-token
    static_configs:
      - targets: ["host.docker.internal:8086"]

  - job_name: savdopro-license
    metrics_path: /actuator/prometheus
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/scrape-token
    static_configs:
      - targets: ["host.docker.internal:9090"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
