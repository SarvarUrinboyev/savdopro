# ====================================================================
#  Test profile overlay — activate with @ActiveProfiles("test").
#  Base config is inherited from application.properties; here we only
#  swap in an in-memory H2 (fresh per run), a dev JWT secret, and switch
#  off external integrations.
# ====================================================================
spring.datasource.url=jdbc:h2:mem:savdopro_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# A 32+ char secret so JwtService boots without the dev-fallback opt-in.
savdopro.jwt.secret=test-only-jwt-secret-not-for-production-0123456789abcdef

# No external integrations during tests.
telegram.enabled=false
telegram.customer-bot.enabled=false
logging.level.org.flywaydb=WARN

# Disable scheduled jobs in tests. The named in-mem H2 (DB_CLOSE_DELAY=-1) is
# shared across @SpringBootTest contexts in the JVM, so a background
# scan/dispatch from one context could mutate another test's rows and cause
# flakiness. Tests drive these code paths explicitly. ("-" = Spring's
# disabled-cron marker.)
webhook.dispatch-cron=-
anomaly.scan-cron=-
anomaly.intraday-scan-cron=-
telegram.morning-reminder-cron=-
telegram.stock-alert-cron=-
telegram.evening-reminder-cron=-
