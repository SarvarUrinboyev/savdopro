# ====================================================================
#  PROD profile overlay — activate with -Dspring.profiles.active=prod
#  (or SPRING_PROFILES_ACTIVE=prod) when running on the VPS.
#
#  Only differences from the default profile go here. Everything else
#  is inherited from application.properties.
# ====================================================================

# --- OpenAPI / Swagger UI: disabled in prod ---
# The default profile (local Electron, dev) ships Swagger so engineers
# can poke the API. On the public VPS we do NOT want the full schema
# and an interactive playground exposed to the internet — disabling
# the springdoc beans here means /v3/api-docs/** and /swagger-ui/**
# stop existing entirely (404), regardless of SecurityConfig rules.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# --- Database: PostgreSQL for the hosted multi-tenant web deployment ---
# Supplied via env vars on the VPS. The desktop build never activates this
# profile, so it keeps using the embedded H2 from application.properties.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/savdopro}
spring.datasource.username=${DB_USER:savdopro}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate still never owns the schema — Flyway does (incl. the V15/V22 Java
# migrations, which use SQL-standard INFORMATION_SCHEMA and run on Postgres).
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Web origin for the WebSocket handshake (and any cross-origin SPA) ---
# Pin to the merchant portal's real origin(s) in production (comma-separated),
# e.g. WEB_ALLOWED_ORIGINS=https://167-172-164-214.nip.io
#
# Fail closed: there is intentionally NO wildcard fallback. Because the API
# uses credentialed CORS, a "*" origin would let any site call it with the
# user's session. If WEB_ALLOWED_ORIGINS is unset the app refuses to start
# (see WebConfig) rather than silently degrade to wildcard.
app.web.allowed-origins=${WEB_ALLOWED_ORIGINS:}

# --- Trusted reverse proxy (X-Forwarded-For) ---
# The prod backend runs behind nginx on the same host, so trust the loopback
# proxy to recover real client IPs for rate limiting / audit. An arbitrary
# external client still cannot spoof X-Forwarded-For (its peer address is not
# in this list). Override TRUSTED_PROXY_CIDRS if the proxy is on another host.
app.proxy.trust-headers=${TRUST_PROXY_HEADERS:true}
app.proxy.trusted-cidrs=${TRUSTED_PROXY_CIDRS:127.0.0.1/32,::1/128}

# --- Honour X-Forwarded-* from the loopback nginx proxy ---
# TLS terminates at nginx; the backend receives plain HTTP on 127.0.0.1. Without
# this, request.isSecure() is false and Spring Security suppresses the HSTS
# header (and any https redirect/cookie flags). "framework" makes Spring apply
# X-Forwarded-Proto=https so the request is treated as secure end-to-end.
# Requires nginx to send: proxy_set_header X-Forwarded-Proto $scheme;
server.forward-headers-strategy=framework

# --- Schema safety: Hibernate must NEVER mutate the prod schema ---
# Flyway (V1..V37+) is the sole schema owner. "validate" asserts at startup that
# every JPA-mapped table/column the entities require already exists — it catches
# drift instead of silently creating columns (the old ddl-auto=update behaviour
# that produced the V29 catch-up migration). It only fails on a MISSING required
# column/table; extra columns left by historical drift are tolerated.
#
# ROLLOUT NOTE: prove this against a copy of the live schema before the switch
# (see docs/ops/production-hardening-runbook.md, Phase 4). If validation is not
# yet proven on staging, deploy the FIRST prod-profile release with the env
# override SPRING_JPA_HIBERNATE_DDL_AUTO=none, then flip to validate once green.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}

# --- Demo/staging seed: HARD-OFF under prod ---
# DemoDataSeeder already refuses to run when the prod profile is active, but pin
# the property too so an accidental ALLOW_DEMO_SEED=true in the environment can
# never seed reserved demo tenants onto a box that holds real customer data.
app.demo-seed.enabled=false

# --- Actuator exposure (prod) ---
# health + info are public (LB probes); prometheus stays authenticated (scrape
# with a service token). env / configprops / beans / heapdump are NEVER exposed.
management.endpoints.web.exposure.include=health,info,prometheus
