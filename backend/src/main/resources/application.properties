# ====================================================================
#  Barakat SuperMarket - Backend configuration
#  Secrets / machine-specific overrides go in application-local.properties
# ====================================================================
spring.application.name=barakat-market
server.port=8086
# Bind to the loopback interface only. The backend serves this PC's desktop
# app, never the network - this avoids a Windows Firewall prompt on first
# launch and keeps the backend unreachable from other machines.
server.address=127.0.0.1

# --- Database (embedded H2 — no server, no setup; data stored in a file) ---
# The .mv.db file lives in the backend working directory, which is
# ~/.barakat when the app is launched by the desktop launcher.
spring.datasource.url=jdbc:h2:file:./barakat;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
# Loopback-only embedded H2 file DB. Credentials are overridable via env so a
# production/shared install can set a strong password; the default keeps existing
# local .mv.db files (created with "barakat") openable without migration.
spring.datasource.username=${DB_USERNAME:barakat}
spring.datasource.password=${DB_PASSWORD:barakat}
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate ---
# Schema is owned by Flyway; Hibernate never alters it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tashkent

# --- Flyway (database migrations) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Auto-repair the schema_history table on startup. Cleans up rows left
# behind by a previous failed migration so a fixed re-deploy succeeds
# without manual intervention.
spring.flyway.repair-on-migrate=true

# --- JSON serialization ---
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Tashkent
spring.jackson.default-property-inclusion=non_null

# --- Static frontend (React build is copied into classpath:/static/) ---
spring.web.resources.static-locations=classpath:/static/
spring.mvc.problemdetails.enabled=true

# --- File upload (warehouse CSV / XLSX bulk import) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# --- Telegram notifications (real values in application-local.properties) ---
telegram.enabled=${TELEGRAM_ENABLED:true}
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-ids=${TELEGRAM_CHAT_IDS:}
# Cron expressions for the scheduled reminders (server local time):
telegram.morning-reminder-cron=0 0 8 * * *
# Daily low-stock audit fires at 09:00, after the morning briefing.
telegram.stock-alert-cron=0 0 9 * * *
telegram.evening-reminder-cron=0 0 22 * * *

# --- Customer self-service Telegram bot (a separate bot from the one above) ---
telegram.customer-bot.enabled=${CUSTOMER_BOT_ENABLED:false}
telegram.customer-bot.token=${CUSTOMER_BOT_TOKEN:}

# --- SMS gateway (Eskiz.uz). Used as a fallback when a customer has not
#     linked the Telegram bot. Disabled until real credentials are set; while
#     disabled every send is a logged no-op. Real values go in
#     application-local.properties or env vars — never commit them. ---
sms.enabled=${SMS_ENABLED:false}
sms.base-url=${SMS_BASE_URL:https://notify.eskiz.uz/api}
sms.email=${SMS_ESKIZ_EMAIL:}
sms.password=${SMS_ESKIZ_PASSWORD:}
sms.from=${SMS_FROM:4546}

# --- Online payment (Click / Payme) for customer debt repayment. Both are
#     disabled until real merchant credentials are set; while disabled, link
#     generation refuses and the webhooks reject every call. Going live also
#     requires passing each provider's sandbox certification. Real values go
#     in application-local.properties or env vars — never commit them. ---
payment.payme.enabled=${PAYME_ENABLED:false}
payment.payme.merchant-id=${PAYME_MERCHANT_ID:}
payment.payme.key=${PAYME_KEY:}
payment.payme.checkout-url=${PAYME_CHECKOUT_URL:https://checkout.paycom.uz}
payment.payme.account=${PAYME_ACCOUNT_FIELD:customer_id}

payment.click.enabled=${CLICK_ENABLED:false}
payment.click.service-id=${CLICK_SERVICE_ID:}
payment.click.merchant-id=${CLICK_MERCHANT_ID:}
payment.click.secret-key=${CLICK_SECRET_KEY:}
payment.click.merchant-user-id=${CLICK_MERCHANT_USER_ID:}
payment.click.checkout-url=${CLICK_CHECKOUT_URL:https://my.click.uz/services/pay}

# --- Transactional email (SMTP). Disabled until SMTP creds are set; while
#     disabled every send is a logged no-op. spring.mail.host being unset means
#     no JavaMailSender is created. Real creds go in application-local.properties. ---
app.email.enabled=${EMAIL_ENABLED:false}
app.email.from=${EMAIL_FROM:no-reply@savdopro.uz}
# Don't let the mail server health indicator drag /actuator/health to DOWN
# when SMTP is unconfigured (host is blank) — email is optional/best-effort.
management.health.mail.enabled=false
# Spring Security 6.3.x @EnableMethodSecurity can hit a self-referential
# 'authorizeReturnObjectMethodInterceptor' bean cycle when bean ordering
# shifts (adding spring-boot-starter-mail tipped it on prod). Allowing
# circular references is the documented workaround — the cycle is inside the
# framework's own security infrastructure, not application beans.
spring.main.allow-circular-references=true
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}

# --- Fiscalization (OFD — mandatory in Uzbekistan). Disabled until a licensed
#     OFD provider + credentials are configured AND the provider adapter is
#     implemented (FiscalizationService.callProvider). While disabled, sales
#     are not registered and the POS flow is unchanged. ---
fiscal.enabled=${FISCAL_ENABLED:false}
fiscal.provider=${FISCAL_PROVIDER:}
fiscal.api-url=${FISCAL_API_URL:}
fiscal.api-key=${FISCAL_API_KEY:}
fiscal.terminal-id=${FISCAL_TERMINAL_ID:}

# --- Global barcode lookup (warehouse scan fallback). Open Food Facts and UPC
#     Item DB are GLOBAL product databases the backend CAN reach (unlike the
#     Uzbek national catalogue tasnif.soliq.uz, which the browser queries
#     directly). The scan modal calls /api/products/barcode-lookup only when the
#     national catalogue returns nothing. URLs are {barcode} templates, override-
#     able per environment; the timeout caps how long a scan can ever wait. ---
barakat.barcode.openfoodfacts.url=${BARCODE_OPENFOODFACTS_URL:https://world.openfoodfacts.org/api/v2/product/{barcode}.json}
barakat.barcode.upcitemdb.url=${BARCODE_UPCITEMDB_URL:https://api.upcitemdb.com/prod/trial/lookup?upc={barcode}}
barakat.barcode.timeout-ms=${BARCODE_TIMEOUT_MS:3000}

# --- Auth (Phase 1A) ---
# JWT signing key. JwtService refuses to boot unless this is a 32+ char
# random string — supply it via the SAVDOPRO_JWT_SECRET env var or in
# application-local.properties. For local dev, set
# SAVDOPRO_ALLOW_DEV_SECRET=true to boot on the shared dev fallback
# (logs a loud WARN; never use in production).
savdopro.jwt.secret=${SAVDOPRO_JWT_SECRET:}
# Default super-admin credentials, created on first launch if no user
# with this username exists. Change the password right after first login.
savdopro.admin.username=${SAVDOPRO_ADMIN_USER:admin}
savdopro.admin.password=${SAVDOPRO_ADMIN_PASSWORD:admin123}
savdopro.admin.full-name=${SAVDOPRO_ADMIN_NAME:Super Admin}

# --- Logging ---
logging.level.root=INFO
logging.level.uz.barakat=INFO

# --- Actuator: DB-aware health + readiness/liveness probes for prod LB/uptime ---
# /actuator/health rolls DB connectivity into UP/DOWN (the static /api/health
# could not). show-details=when-authorized -> public probe sees only the status;
# signed-in admins see component detail.
# prometheus is exposed for scraping but secured to authenticated callers in
# SecurityConfig (health/info stay public). Scrape it with a service bearer
# token; for stricter isolation run it on a firewalled management port.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized

# --- Error tracking (Sentry, optional) ---
# Unhandled exceptions auto-report to Sentry once SENTRY_DSN is set; blank
# (the default) disables Sentry entirely, so dev/unconfigured installs are
# unaffected. traces-sample-rate stays 0 (errors only, no perf overhead);
# PII is never sent.
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:production}
sentry.traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.0}
sentry.send-default-pii=false

# --- Local overrides (optional, gitignored) ---
spring.config.import=optional:file:./application-local.properties
