name: Deploy

# Build + deploy to the production droplet. Manual by default (Run workflow),
# and automatically on a version tag. Mirrors the hand-deploy runbook:
# build → upload .new → verify SHA256 → systemctl swap → health-verify.
#
# REQUIRED GitHub repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_KEY   — private SSH key authorised on the droplet (root)
#   DEPLOY_HOST      — 167.172.164.214
#   DEPLOY_USER      — root
# Optional variables (Settings → Variables), with sensible defaults:
#   LICENSE_URL      — https://167-172-164-214.nip.io  (VITE_LICENSE_URL for the web build)
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  # Tests GATE the deploy: a red suite means no jar reaches the droplet.
  # (Emergency path: the manual hand-deploy runbook, not a CI bypass.)
  test-backend:
    name: Backend tests (gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        run: |
          chmod +x ./mvnw
          ./mvnw -B --no-transfer-progress test

  test-license:
    name: License-server tests (gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: license-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        run: |
          chmod +x ./mvnw
          ./mvnw -B --no-transfer-progress test

  deploy:
    name: Build & deploy to prod
    runs-on: ubuntu-latest
    needs: [test-backend, test-license]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 1) Frontend → bundled into the backend's static resources
      - name: Build web frontend
        working-directory: frontend
        env:
          VITE_TARGET: web
          VITE_LICENSE_URL: ${{ vars.LICENSE_URL || 'https://167-172-164-214.nip.io' }}
        run: |
          npm ci
          npm run build
          # Guard against a partial build (e.g. an obfuscator/plugin dropping
          # lazy chunks): a missing page chunk 404s at runtime and takes the
          # page down. Assert every key chunk exists + a sane total, else FAIL
          # the deploy loudly instead of shipping a broken UI (incident 2026-06-04).
          ASSETS=../backend/src/main/resources/static/assets
          n=$(ls "$ASSETS"/*.js | wc -l); echo "frontend js chunks: $n"
          for p in Dashboard ProductEditor Payments Reports Customers Warehouse Orders Debt; do
            ls "$ASSETS" | grep -qE "^${p}-" || { echo "::error::frontend build missing the $p chunk — refusing to deploy"; exit 1; }
          done
          [ "$n" -ge 25 ] || { echo "::error::frontend build produced only $n chunks (expected >=25) — refusing to deploy"; exit 1; }
          echo "frontend build complete ✓"

      # 2) Backend jar (bundles the freshly built frontend) + license jar
      - name: Build backend jar
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw -B --no-transfer-progress -DskipTests clean package
          # jar:jar can intermittently omit src/main/resources from the jar
          # (no application.properties / db migrations / static) — see
          # memory/prod-deploy.md INCIDENT 2026-06-02. Repackage the fully
          # populated target/classes and ASSERT the resources are present;
          # retry a few times, then fail loudly rather than ship a broken jar.
          ok=0
          for attempt in 1 2 3; do
            ./mvnw -B --no-transfer-progress -o jar:jar spring-boot:repackage
            props=$(jar tf target/barakat-market.jar | grep -c 'BOOT-INF/classes/application.properties' || true)
            sql=$(jar tf target/barakat-market.jar | grep -cE 'db/migration/V.*\.sql' || true)
            ui=$(jar tf target/barakat-market.jar | grep -c 'BOOT-INF/classes/static/index.html' || true)
            echo "attempt $attempt: props=$props sql=$sql static=$ui"
            if [ "$props" -ge 1 ] && [ "$sql" -ge 20 ] && [ "$ui" -ge 1 ]; then ok=1; break; fi
          done
          [ "$ok" = "1" ] || { echo "::error::jar is missing bundled resources after 3 attempts"; exit 1; }
      - name: Build license-server jar
        working-directory: license-server
        run: |
          chmod +x ./mvnw
          ./mvnw -B --no-transfer-progress -DskipTests clean package

      # 3) Deploy over SSH: upload .new, verify SHA256, swap, restart, verify
      - name: Deploy
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          BE=$(ls backend/target/*.jar | grep -v original | head -1)
          LS=$(ls license-server/target/*.jar | grep -v original | head -1)
          BE_SHA=$(sha256sum "$BE" | cut -d' ' -f1)
          LS_SHA=$(sha256sum "$LS" | cut -d' ' -f1)

          scp -i ~/.ssh/id_deploy "$BE" "$USER@$HOST:/opt/barakat/barakat-market.jar.new"
          scp -i ~/.ssh/id_deploy "$LS" "$USER@$HOST:/opt/savdopro/savdopro-license-server.jar.new"

          ssh -i ~/.ssh/id_deploy "$USER@$HOST" \
            BE_SHA="$BE_SHA" LS_SHA="$LS_SHA" 'bash -s' <<'REMOTE'
          set -euo pipefail
          [ "$(sha256sum /opt/barakat/barakat-market.jar.new | cut -d" " -f1)" = "$BE_SHA" ] || { echo "backend SHA mismatch"; exit 1; }
          [ "$(sha256sum /opt/savdopro/savdopro-license-server.jar.new | cut -d" " -f1)" = "$LS_SHA" ] || { echo "license SHA mismatch"; exit 1; }
          systemctl stop savdopro-backend savdopro-license
          cp -f /opt/barakat/barakat-market.jar /opt/barakat/barakat-market.jar.bak-ci 2>/dev/null || true
          cp -f /opt/savdopro/savdopro-license-server.jar /opt/savdopro/savdopro-license-server.jar.bak-ci 2>/dev/null || true
          mv -f /opt/barakat/barakat-market.jar.new /opt/barakat/barakat-market.jar
          mv -f /opt/savdopro/savdopro-license-server.jar.new /opt/savdopro/savdopro-license-server.jar
          systemctl start savdopro-license
          for i in $(seq 1 30); do sleep 4; curl -sf -m4 http://127.0.0.1:9090/actuator/health >/dev/null 2>&1 && break; done
          systemctl start savdopro-backend
          # NB: under `set -e`, `c=$(curl ...)` aborts the WHOLE script the first
          # time curl can't connect (backend still starting → curl exit 7), so the
          # retry loop never actually retries — the deploy reports a false failure
          # even though the jars are already swapped and the service comes up fine.
          # Use the same `&& { ok=1; break; }` form as the license check below: set -e
          # exempts a command that isn't the last in an && list, so a failed poll
          # just continues the loop. (See prod-deploy runbook, v2.1.0 deploy.)
          ok=0; for i in $(seq 1 40); do sleep 4; curl -sf -m4 http://127.0.0.1:8086/actuator/health >/dev/null 2>&1 && { ok=1; break; }; done
          [ "$ok" = "1" ] || { echo "backend health check FAILED"; exit 1; }
          echo "deploy OK"
          REMOTE
