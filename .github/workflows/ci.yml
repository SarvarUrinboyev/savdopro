name: CI

# Automated quality gate: every push and PR builds and tests all three
# modules. Backend + license-server run their full JUnit suites against the
# H2 "test" profile (no external DB needed); the frontend must compile.
on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        run: |
          chmod +x ./mvnw
          ./mvnw -B --no-transfer-progress test

  license-server:
    name: License-server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: license-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run tests
        run: |
          chmod +x ./mvnw
          ./mvnw -B --no-transfer-progress test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
